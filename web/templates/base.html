<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MSME Ledger Digitisation{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="{{ url_for('index') }}">
        <img class="logo" src="{{ url_for('static', filename='logo.png') }}" alt="Chinhoyi University of Technology logo">
        <div class="brand-text">
          <div class="university">Chinhoyi University of Technology</div>
          <div class="app-name">MSME Ledger Digitisation</div>
        </div>
      </a>
      <nav>
        <a href="{{ url_for('index') }}">Upload</a>
        <a href="{{ url_for('export', fmt='csv') }}">Export CSV</a>
        <a href="{{ url_for('export', fmt='json') }}">Export JSON</a>
      </nav>
    </div>
  </header>

  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flashes">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
